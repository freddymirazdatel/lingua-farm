name: Build Flet APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Flet and Dependencies
        run: |
          pip install "flet[all]"

      - name: Build APK
        run: |
          flet build apk --project lingua_farm --org com.freddy --product "Lingua Farm"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lingua-farm-app
          path: build/apk/*.apk
          
